version: '3.8'

services: 
  # Main User Management Application
  main_app_user-management-app:
    build:
      context: ..
      dockerfile: .tr-codegen/Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        - VCS_REF=${VCS_REF:-$(git rev-parse --short HEAD)}
    image: tr-codegen/user-management:latest
    container_name: tr-codegen-user-management
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - tr-codegen-network
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=80
      - TZ=${TZ:-UTC}
    labels:
      - "com.tr-codegen.service=user-management"
      - "com.tr-codegen.version=2.0"
      - "traefik.enable=true"
      - "traefik.http.routers.user-management.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.user-management.loadbalancer.server.port=80"
      - "traefik.docker.network=tr-codegen-network"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - app-logs:/var/log/nginx
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # Development Hot Reload (Optional)
  dev-server:
    image: nginx:alpine
    container_name: tr-codegen-dev-server
    ports:
      - "${DEV_PORT:-3001}:80"
    volumes:
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../styles.css:/usr/share/nginx/html/styles.css:ro
      - ../script.js:/usr/share/nginx/html/script.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tr-codegen-network
    profiles:
      - "development"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "com.tr-codegen.service=dev-server"
      - "com.tr-codegen.environment=development"

  # Reverse Proxy with Traefik
  traefik:
    image: traefik:v2.10
    container_name: tr-codegen-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tr-codegen-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - tr-codegen-network
    restart: unless-stopped
    profiles:
      - "proxy"
    labels:
      - "com.tr-codegen.service=reverse-proxy"

  # Monitoring with Prometheus and Grafana
  prometheus:
    image: prom/prometheus:latest
    container_name: tr-codegen-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - tr-codegen-network
    restart: unless-stopped
    profiles:
      - "monitoring"
    labels:
      - "com.tr-codegen.service=metrics"

  grafana:
    image: grafana/grafana:latest
    container_name: tr-codegen-grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - tr-codegen-network
    restart: unless-stopped
    profiles:
      - "monitoring"
    labels:
      - "com.tr-codegen.service=dashboard"

  # Nginx Exporter for Prometheus
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11.0
    container_name: tr-codegen-nginx-exporter
    command:
      - -nginx.scrape-uri=http://main_app_user-management-app:80/nginx_status
    ports:
      - "${NGINX_EXPORTER_PORT:-9113}:9113"
    networks:
      - tr-codegen-network
    depends_on:
      - main_app_user-management-app
    restart: unless-stopped
    profiles:
      - "monitoring"
    labels:
      - "com.tr-codegen.service=nginx-metrics"

  # Redis for session storage (if needed for future features)
  redis:
    image: redis:7-alpine
    container_name: tr-codegen-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - tr-codegen-network
    restart: unless-stopped
    profiles:
      - "cache"
    labels:
      - "com.tr-codegen.service=cache"

networks:
  tr-codegen-network:
    driver: bridge
    name: tr-codegen-net
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  app-logs:
    driver: local
    name: tr-codegen-app-logs
  
  prometheus-data:
    driver: local
    name: tr-codegen-prometheus-data
  
  grafana-data:
    driver: local
    name: tr-codegen-grafana-data
  
  traefik-certs:
    driver: local
    name: tr-codegen-traefik-certs
  
  redis-data:
    driver: local
    name: tr-codegen-redis-data
