version: '3.8'

services:
  # Main web application service
  user-management-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-management-system
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - user-management-network
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-management.rule=Host(`localhost`)"
      - "traefik.http.services.user-management.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Optional: Mount logs for debugging
      - ./logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Optional: Add a reverse proxy (Traefik) for advanced routing
  reverse-proxy:
    image: traefik:v2.10
    container_name: user-management-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - user-management-network
    restart: unless-stopped
    profiles:
      - "proxy"  # Only start with --profile proxy

  # Optional: Add monitoring with Nginx Prometheus Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.10.0
    container_name: user-management-metrics
    command:
      - -nginx.scrape-uri=http://user-management-app:80/nginx_status
    ports:
      - "9113:9113"
    networks:
      - user-management-network
    depends_on:
      - user-management-app
    restart: unless-stopped
    profiles:
      - "monitoring"  # Only start with --profile monitoring

networks:
  user-management-network:
    driver: bridge
    name: user-management-net

volumes:
  nginx-logs:
    driver: local
