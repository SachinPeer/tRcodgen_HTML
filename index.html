<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="header-icon">👥</div>
            <h1>User Management System</h1>
            <p class="subtitle">Manage your users efficiently</p>
        </div>
        
        <!-- Error message container -->
        <div id="errorMessage" class="error-message" style="display: none;"></div>
        
        <div class="user-form">
            <div class="form-header">
                <div class="form-icon">➕</div>
                <h2>Add New User</h2>
            </div>
            <form id="userForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="userName">👤 Name:</label>
                        <input type="text" id="userName" required placeholder="Enter full name">
                    </div>
                    
                    <div class="form-group">
                        <label for="userEmail">📧 Email:</label>
                        <input type="email" id="userEmail" required placeholder="Enter email address">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="userAge">🎂 Age:</label>
                        <input type="number" id="userAge" required placeholder="Enter age">
                    </div>
                    
                    <div class="form-group">
                        <label for="userRole">👔 Role:</label>
                        <select id="userRole" required>
                            <option value="">Select Role</option>
                            <option value="admin">👑 Admin</option>
                            <option value="user">👤 User</option>
                            <option value="moderator">🛡️ Moderator</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn">Add User</button>
                <button type="button" id="clearBtn">Clear Form</button>
            </form>
        </div>
        
        <div class="user-list">
            <div class="list-header">
                <div class="list-icon">📋</div>
                <h2>User List</h2>
            </div>
            <div class="search-container">
                <div class="search-icon">🔍</div>
                <input type="text" id="searchInput" placeholder="Search users by name, email, or role...">
                <button type="button" id="searchBtn">🔍 Search</button>
            </div>
            
            <table id="userTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Age</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Users will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
